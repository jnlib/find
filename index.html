<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>종로도서관 AI 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#07213a;--teal:#00cfc0;--teal2:#00a898;--blue:#3182ff;--muted:#7a9ab8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#f0f5ff,#eaf6f4);display:flex;flex-direction:column;align-items:center}
.shell{width:100%;max-width:520px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:rgba(255,255,255,.6);backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(7,33,58,.08)}
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.95);border-bottom:1px solid rgba(0,207,192,.12);position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal) 30%,var(--blue) 70%,transparent);background-size:200%;animation:flowLine 3s linear infinite}
@keyframes flowLine{from{background-position:200% 0}to{background-position:-200% 0}}
.hdr-av{width:36px;height:36px;border-radius:50%;background:rgba(0,207,192,.08);border:1.5px solid rgba(0,207,192,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.hdr-av img{width:28px;height:28px;object-fit:contain;animation:floatY 4s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.hdr-title{font-size:.88em;font-weight:900;color:var(--navy)}
.hdr-sub{font-size:.66em;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:4px}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:dotPulse 1.6s infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,207,192,.4)}50%{box-shadow:0 0 0 3px rgba(0,207,192,.12)}}
.chat{flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(0,207,192,.2);border-radius:3px}
.bubble-row{display:flex;align-items:flex-end;gap:8px}
.bubble-row.user{flex-direction:row-reverse}
.bav{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:rgba(0,207,192,.08);border:1.5px solid rgba(0,207,192,.15);display:flex;align-items:center;justify-content:center;overflow:hidden}
.bav img{width:22px;height:22px;object-fit:contain}
.bav.u{background:var(--navy);font-size:.72em;color:rgba(255,255,255,.8);font-weight:700}
.bubble{max-width:84%;padding:11px 14px;border-radius:16px;font-size:.875em;line-height:1.78;color:var(--navy);animation:bubIn .3s cubic-bezier(.22,.68,0,1.2)}
@keyframes bubIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:none}}
.bubble.ai{background:#fff;border:1px solid rgba(0,207,192,.15);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(7,33,58,.06)}
.bubble.user{background:linear-gradient(135deg,#00c4b4,#0075d8);color:#fff;border-bottom-right-radius:4px}
.card{background:#f4f8ff;border:1.5px solid rgba(0,207,192,.18);border-radius:12px;overflow:hidden;margin-top:10px}
.card-bar{height:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.card-body{padding:12px 14px}
.card-lbl{font-size:.63em;color:var(--muted);font-weight:700;letter-spacing:.06em;margin-bottom:7px}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(0,207,192,.1)}
.card-ico{width:36px;height:36px;border-radius:50%;background:#eef6ff;border:1.5px solid rgba(0,207,192,.18);display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0}
.card-dept{font-size:.63em;color:var(--muted);margin-bottom:2px}
.card-name{font-size:.9em;font-weight:900;color:var(--navy)}
.card-role{font-size:.65em;color:var(--muted);margin-top:1px}
.card-tel{display:flex;align-items:center;gap:7px;background:#fff;border-radius:8px;padding:8px 11px;border:1px solid rgba(0,207,192,.12);margin-bottom:7px}
.card-tel-num{font-size:.94em;font-weight:900;color:var(--navy);letter-spacing:.05em;margin-left:auto}
.card-duties{display:flex;flex-wrap:wrap;gap:4px}
.card-duty{padding:2px 8px;background:rgba(49,130,255,.07);border-radius:20px;border:1px solid rgba(49,130,255,.12);font-size:.63em;color:var(--blue)}
.fcard{background:#f0f7ff;border:1.5px solid rgba(49,130,255,.16);border-radius:12px;overflow:hidden;margin-top:10px}
.fbar{height:3px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.fbody{padding:12px 14px}
.flbl{font-size:.63em;color:var(--muted);font-weight:700;letter-spacing:.06em;margin-bottom:6px}
.ftitle{font-size:.86em;font-weight:900;color:var(--navy);margin-bottom:6px}
.fsummary{font-size:.78em;color:#3a5a78;line-height:1.85}
.flink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:7px 16px;background:linear-gradient(135deg,#00c4b4,#0075d8);color:#fff;border-radius:50px;font-size:.76em;font-weight:700;text-decoration:none}
.fallbox{background:#fff8f0;border:1.5px solid rgba(245,160,0,.2);border-radius:10px;padding:12px 14px;margin-top:10px;text-align:center}
.falltel{font-size:1.15em;font-weight:900;color:var(--navy);letter-spacing:.06em;margin-top:3px}
.fallsub{font-size:.65em;color:var(--muted);margin-top:2px}
.load-row{display:flex;align-items:flex-end;gap:8px}
.load-bub{background:#fff;border:1px solid rgba(0,207,192,.15);border-radius:16px;border-bottom-left-radius:4px;padding:14px 18px;box-shadow:0 2px 12px rgba(7,33,58,.06);display:flex;flex-direction:column;align-items:center;gap:10px;min-width:170px}
.load-ring{position:relative;width:56px;height:56px}
.load-ring img{width:56px;height:56px;object-fit:contain;position:absolute;inset:0;animation:mascBounce 1.2s ease-in-out infinite}
@keyframes mascBounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-8px) scale(1.06)}70%{transform:translateY(-3px) scale(.97)}}
.load-ring-c{position:absolute;inset:-7px;border-radius:50%;border:2.5px solid transparent;background:linear-gradient(white,white) padding-box,conic-gradient(from 0deg,rgba(0,207,192,.08),rgba(0,207,192,1) 50%,rgba(49,130,255,1) 80%,rgba(0,207,192,.08)) border-box;animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:.75em;color:var(--teal2);font-weight:700;text-align:center}
.load-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--teal2);margin:0 2px;animation:dot .9s ease-in-out infinite}
.load-dots span:nth-child(2){animation-delay:.18s}
.load-dots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.iarea{flex-shrink:0;padding:10px 14px 14px;background:rgba(255,255,255,.95);border-top:1px solid rgba(0,207,192,.1)}
.irow{display:flex;gap:8px;align-items:flex-end}
.ibox{flex:1;padding:11px 14px;border:2px solid rgba(0,207,192,.2);border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:.9em;color:var(--navy);background:#f8fbff;outline:none;resize:none;max-height:100px;transition:border-color .15s,box-shadow .15s;line-height:1.5}
.ibox:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,207,192,.1);background:#fff}
.ibox::placeholder{color:rgba(7,33,58,.3)}
.sbtn{width:42px;height:42px;flex-shrink:0;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#00c4b4,#0075d8);color:#fff;font-size:1.1em;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,160,200,.3);transition:transform .12s,opacity .12s}
.sbtn:hover{transform:scale(1.07)}
.sbtn:active{transform:scale(.93)}
.sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.ihint{font-size:.63em;color:rgba(7,33,58,.25);text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-av"><img src="https://jnlib.github.io/find/mascot.png" alt=""></div>
    <div>
      <div class="hdr-title">종로도서관 AI 안내</div>
      <div class="hdr-sub"><span class="hdr-dot"></span>무엇이든 물어보세요</div>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="iarea">
    <div class="irow">
      <textarea class="ibox" id="ibox" placeholder="궁금한 것을 입력하세요..." rows="1"
        onkeydown="hKey(event)" oninput="aResize(this)"></textarea>
      <button class="sbtn" id="sbtn" onclick="send()">→</button>
    </div>
    <div class="ihint">Enter 전송 · Shift+Enter 줄바꿈</div>
  </div>
</div>
<script>
var W='https://findjnlib.hdh1231.workers.dev/search';
var M='https://jnlib.github.io/find/mascot.png';
var chat=document.getElementById('chat');
var ibox=document.getElementById('ibox');
var sbtn=document.getElementById('sbtn');
var MSGS=['질문을 분석하고 있어요','담당자를 찾고 있어요','관련 정보를 확인하고 있어요','거의 다 됐어요'];

window.addEventListener('DOMContentLoaded',function(){
  var q=new URLSearchParams(window.location.search).get('q')||'';
  if(q){addUser(q);doSearch(q);}
  else{addAI('<span style="color:var(--muted)">안녕하세요! 😊<br>도서관 이용 관련 무엇이든 물어보세요.</span>');}
  ibox.focus();
});

function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function aResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function scrollB(){chat.scrollTop=chat.scrollHeight;}

function addUser(txt){
  var r=document.createElement('div');r.className='bubble-row user';
  r.innerHTML='<div class="bav u">나</div><div class="bubble user">'+esc(txt)+'</div>';
  chat.appendChild(r);scrollB();
}
function addAI(html){
  var r=document.createElement('div');r.className='bubble-row';
  r.innerHTML='<div class="bav"><img src="'+M+'" alt=""></div><div class="bubble ai">'+html+'</div>';
  chat.appendChild(r);scrollB();return r;
}
function addLoad(){
  var r=document.createElement('div');r.className='load-row';
  r.innerHTML='<div class="bav"><img src="'+M+'" alt=""></div>'
    +'<div class="load-bub">'
    +'<div class="load-ring"><div class="load-ring-c"></div><img src="'+M+'" alt=""></div>'
    +'<div id="lmsg" class="load-msg">'+MSGS[0]+' <span class="load-dots"><span></span><span></span><span></span></span></div>'
    +'</div>';
  chat.appendChild(r);scrollB();
  var mi=0;
  var t=setInterval(function(){
    mi=(mi+1)%MSGS.length;
    var el=document.getElementById('lmsg');
    if(el)el.innerHTML=MSGS[mi]+' <span class="load-dots"><span></span><span></span><span></span></span>';
  },900);
  r._stop=function(){clearInterval(t);};
  return r;
}

function send(){
  var q=ibox.value.trim();if(!q)return;
  ibox.value='';ibox.style.height='auto';
  addUser(q);doSearch(q);
}

async function doSearch(q){
  sbtn.disabled=true;
  var lr=addLoad();
  var _d=null;
  try{
    var res=await fetch(W,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    _d={status:res.status};
    var data=await res.json();
    _d.ok=true;
    // 임시 디버그: 오류면 화면에 표시
    if(data.error){
      if(lr._stop)lr._stop();lr.remove();
      addAI('🚨 워커오류: '+esc(data.error)+'<br><small style="color:#999">'+esc(data.debug||'')+'</small>');
      return;
    }
    if(lr._stop)lr._stop();lr.remove();
    render(data,q);
  }catch(e){
    console.debug('[chat]',e.message,_d); // 디버그 (숨김)
    if(lr._stop)lr._stop();lr.remove();
    addAI('일시적인 오류가 발생했어요 😥<br>잠시 후 다시 시도해 주세요.'
      +'<div class="fallbox"><div style="font-size:.78em;color:var(--muted)">안내실</div>'
      +'<div class="falltel">02-721-0729</div>'
      +'<div class="fallsub">평일 09:00 – 18:00</div></div>');
  }finally{sbtn.disabled=false;ibox.focus();}
}

function render(data,q){
  var staff=data.staff,faq=data.faq;
  if(!staff&&!faq){
    addAI('"<strong>'+esc(q)+'</strong>"에 대한 정보를 찾지 못했어요 😅<br>안내실로 문의해 주시면 바로 도와드릴게요!'
      +'<div class="fallbox"><div style="font-size:.78em;color:var(--muted)">안내실</div>'
      +'<div class="falltel">02-721-0729</div>'
      +'<div class="fallsub">평일 09:00 – 18:00</div></div>');
    return;
  }
  var html='찾았어요! 아래 내용을 확인해 주세요 😊';
  if(staff){
    var duties=(staff.duties||[]).slice(0,3).map(function(d){return'<span class="card-duty">'+esc(d)+'</span>';}).join('');
    html+='<div class="card"><div class="card-bar"></div><div class="card-body">'
      +'<div class="card-lbl">👤 담당자</div>'
      +'<div class="card-top"><div class="card-ico">🧑</div><div>'
      +'<div class="card-dept">'+esc(staff.dept)+'</div>'
      +'<div class="card-name">'+esc(staff.name)+'</div>'
      +'<div class="card-role">'+esc(staff.role)+'</div>'
      +'</div></div>'
      +'<div class="card-tel"><span>☎</span><span style="font-size:.66em;color:var(--muted)">직통</span>'
      +'<span class="card-tel-num">02-'+esc(staff.tel)+'</span></div>'
      +'<div class="card-duties">'+duties+'</div>'
      +'</div></div>';
  }
  if(faq){
    var lb=faq.link?'<a class="flink" href="'+esc(faq.link)+'" target="_blank">🔗 자세히 보기</a>':'';
    html+='<div class="fcard"><div class="fbar"></div><div class="fbody">'
      +'<div class="flbl">📚 관련 안내</div>'
      +'<div class="ftitle">'+esc(faq.title)+'</div>'
      +'<div class="fsummary">'+esc(faq.summary)+'</div>'
      +lb+'</div></div>';
  }
  addAI(html);
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
