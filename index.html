<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.fp{font-family:'Noto Sans KR',sans-serif;background:#fff;border-radius:24px;padding:28px 22px 24px;box-shadow:0 4px 30px rgba(7,33,58,.12);max-width:340px;margin:0 auto;text-align:center}
.fp-img{width:86px;height:86px;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 6px 18px rgba(0,207,192,.3))}
.fp-title{font-size:21px;font-weight:900;color:#07213a;margin-bottom:6px}
.fp-desc{font-size:14px;color:#7a9ab8;line-height:1.7;margin-bottom:20px}
.fp-input{width:100%;padding:15px 16px;border:2px solid #e8eef8;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#07213a;background:#f7f9ff;outline:none;text-align:center;margin-bottom:13px}
.fp-input:focus{border-color:#00cfc0;box-shadow:0 0 0 4px rgba(0,207,192,.1);background:#fff}
.fp-input::placeholder{color:#b0bdd0;font-size:14px}
.fp-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;background:linear-gradient(135deg,#00c4b4,#0075d8);color:#fff;border:none;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(0,160,200,.32);width:100%;margin-bottom:0}
.fp-divider{display:flex;align-items:center;gap:8px;margin:18px 0 14px}
.fp-divider::before,.fp-divider::after{content:'';flex:1;height:1px;background:#eef1f8}
.fp-divider span{font-size:12px;color:#b0bdd0;white-space:nowrap;font-weight:700}
.fp-examples{display:flex;flex-direction:column;gap:9px}
.fp-ex{padding:14px 16px;background:#f6f9ff;border:1.5px solid #dde8f8;border-radius:14px;font-size:14px;color:#07213a;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:block;text-align:left;font-weight:500;line-height:1.5}
.fp-ex:hover{background:#eef4ff;border-color:#00cfc0}
</style>
<div class="fp">
  <img class="fp-img" src="https://jnlib.github.io/find/mascot.png" alt="">
  <div class="fp-title">무엇이든 물어보세요</div>
  <div class="fp-desc">담당자 안내부터 도서관 이용 정보까지<br>AI가 한 번에 찾아드려요</div>
  <form action="https://jnlib.github.io/find/chat.html" method="GET" target="_blank">
    <input class="fp-input" name="q" placeholder="궁금한 것을 자유롭게 입력하세요">
    <input type="hidden" name="autoSend" value="true">
    <button class="fp-btn" type="submit">✨ AI에게 물어보기</button>
  </form>
  <div class="fp-divider"><span>이런 질문도 해보세요</span></div>
  <div class="fp-examples">
    <a class="fp-ex" href="https://jnlib.github.io/find/chat.html?q=%EC%9D%BD%EA%B3%A0+%EC%8B%B6%EC%9D%80+%EC%B1%85%EC%9D%B4+%EC%9E%88%EB%8A%94%EB%8D%B0+%EB%8F%84%EC%84%9C%EA%B4%80%EC%97%90+%EC%97%86%EC%96%B4%EC%9A%94&autoSend=false" target="_blank">📚 읽고 싶은 책이 있는데 도서관에 없어요</a>
    <a class="fp-ex" href="https://jnlib.github.io/find/chat.html?q=%EC%B1%85%EC%9D%84+%EB%8A%A6%EA%B2%8C+%EB%B0%98%EB%82%A9%ED%96%88%EB%8A%94%EB%8D%B0+%EC%97%B0%EC%B2%B4%EB%A3%8C%EA%B0%80+%EB%84%88%EB%AC%B4+%EA%B1%B1%EC%A0%95%EB%8F%BC%EC%9A%94&autoSend=false" target="_blank">😰 책을 늦게 반납했는데 연체료가 너무 걱정돼요</a>
    <a class="fp-ex" href="https://jnlib.github.io/find/chat.html?q=%EB%8F%84%EC%84%9C%EA%B4%80%EC%97%90%EC%84%9C+%EB%B0%B0%EC%9A%B8+%EC%88%98+%EC%9E%88%EB%8A%94+%EA%B0%95%EC%A2%8C%EA%B0%80+%EC%9E%88%EB%82%98%EC%9A%94&autoSend=false" target="_blank">🎓 도서관에서 배울 수 있는 강좌가 있나요?</a>
    <a class="fp-ex" href="https://jnlib.github.io/find/chat.html?q=65%EC%84%B8+%EC%96%B4%EB%A5%B4%EC%8B%A0%EC%9D%B8%EB%8D%B0+%EC%A7%91%EC%97%90%EC%84%9C+%EC%B1%85+%EB%B0%9B%EC%95%84%EB%B3%BC+%EC%88%98+%EC%9E%88%EB%82%98%EC%9A%94&autoSend=false" target="_blank">👴 65세 어르신인데 집에서 책 받아볼 수 있나요?</a>
  </div>
</div>
