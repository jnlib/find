<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>findjnlib 관리자</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--navy:#07213a;--teal:#00cfc0;--blue:#3182ff;--red:#e53e3e;--muted:#7a9ab8;--border:#e2e8f0;--radius:12px;--orange:#ed8936}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
.top{background:linear-gradient(135deg,#07213a,#0a3d6e);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top h1{font-size:18px;font-weight:700}
.top .logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:13px}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#07213a,#0a3d6e)}
.login-box{background:#fff;padding:40px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;width:340px}
.login-box h2{margin-bottom:20px;color:var(--navy)}
.login-box input{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px}
.login-box button{width:100%;padding:12px;background:var(--teal);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:#fff;padding:0 24px;overflow-x:auto}
.tab{padding:14px 20px;cursor:pointer;font-weight:600;font-size:14px;border-bottom:3px solid transparent;color:var(--muted);transition:.2s;white-space:nowrap}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab:hover{color:var(--navy)}
.panel{display:none;padding:20px 24px}
.panel.active{display:block}
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:200px;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-teal{background:var(--teal);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--navy)}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
th,td{padding:10px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border)}
th{background:#f8fafc;font-weight:700;color:var(--muted);font-size:12px;text-transform:uppercase;position:sticky;top:0}
tr:hover td{background:#f7faff}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:95%;max-width:1100px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin-bottom:16px;font-size:17px}
.modal-split{display:flex;gap:24px}
.modal-left{flex:1;min-width:0}
.modal-right{width:340px;flex-shrink:0;position:sticky;top:0;align-self:flex-start;max-height:75vh;overflow-y:auto}
@media(max-width:900px){.modal-split{flex-direction:column}.modal-right{width:100%;position:static;max-height:none}}
@media(max-width:700px){#panel-stats .test-area+.test-area{margin-top:0} #panel-stats>div:nth-child(3){grid-template-columns:1fr!important}}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-teal{background:rgba(0,207,192,.12);color:#00a898}
.badge-blue{background:rgba(49,130,255,.12);color:var(--blue)}
.test-area{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.test-input{display:flex;gap:10px;margin-bottom:16px}
.test-input input{flex:1;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px}
.result-card{background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid var(--teal)}
.result-card .score{float:right;font-weight:700;color:var(--teal)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:300;animation:fadeIn .3s;max-width:400px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rel-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.rel-tag{background:rgba(49,130,255,.1);color:var(--blue);padding:3px 10px;border-radius:12px;font-size:12px;cursor:pointer}
.rel-tag .x{margin-left:4px;color:var(--red);font-weight:700}
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tip-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fbbf24;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.7}
.tip-box b{color:#92400e}
.tip-box .prompt{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px;margin:6px 0;font-size:12px;color:#374151;white-space:pre-wrap;cursor:pointer;position:relative}
.tip-box .prompt:hover{background:#f0fdf4;border-color:var(--teal)}
.tip-box .prompt::after{content:'클릭하면 복사';position:absolute;right:8px;top:8px;font-size:10px;color:var(--muted)}
.upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.2s;margin:10px 0}
.upload-area:hover{border-color:var(--teal);background:rgba(0,207,192,.04)}
.upload-area input{display:none}
.progress-bar{background:#eee;border-radius:4px;height:8px;margin:8px 0;overflow:hidden}
.progress-bar .fill{background:var(--teal);height:100%;transition:width .3s;border-radius:4px}
</style>
</head>
<body>
<!-- 로그인 -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h2>findjnlib 관리자</h2>
    <input type="password" id="pwInput" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 메인 -->
<div id="mainWrap" style="display:none">
  <div class="top">
    <h1>findjnlib 관리자</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="doMigrate()">초기화/마이그레이션</button>
      <button class="logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="faq" onclick="switchTab('faq',this)">FAQ 관리</div>
    <div class="tab" data-tab="staff" onclick="switchTab('staff',this)">담당자 관리</div>
    <div class="tab" data-tab="stats" onclick="switchTab('stats',this);loadStats()">통계 대시보드</div>
    <div class="tab" data-tab="test" onclick="switchTab('test',this)">테스트 콘솔</div>
  </div>

  <!-- FAQ 패널 -->
  <div id="panel-faq" class="panel active">
    <div class="toolbar">
      <input type="text" id="faqSearch" placeholder="FAQ 검색..." oninput="renderFaqs()">
      <button class="btn btn-teal" onclick="openFaqModal()">+ FAQ 추가</button>
      <button class="btn btn-blue" onclick="downloadFaqCsv()">CSV 다운로드</button>
      <button class="btn btn-orange" onclick="document.getElementById('faqUpload').click()">CSV 업로드</button>
      <input type="file" id="faqUpload" accept=".csv" style="display:none" onchange="uploadFaqCsv(this)">
    </div>
    <div style="overflow-x:auto">
      <table><thead><tr><th>ID</th><th>제목</th><th>공감 한마디</th><th>꼬리질문</th><th>링크</th><th>관리</th></tr></thead>
      <tbody id="faqTable"></tbody></table>
    </div>
  </div>

  <!-- 담당자 패널 -->
  <div id="panel-staff" class="panel">
    <div class="toolbar">
      <input type="text" id="staffSearch" placeholder="담당자 검색..." oninput="renderStaffs()">
      <button class="btn btn-teal" onclick="openStaffModal()">+ 담당자 추가</button>
      <button class="btn btn-blue" onclick="downloadStaffCsv()">CSV 다운로드</button>
      <button class="btn btn-orange" onclick="document.getElementById('staffUpload').click()">CSV 업로드</button>
      <input type="file" id="staffUpload" accept=".csv" style="display:none" onchange="uploadStaffCsv(this)">
    </div>
    <div style="overflow-x:auto">
      <table><thead><tr><th>ID</th><th>부서</th><th>직책</th><th>이름</th><th>전화</th><th>키워드</th><th>관리</th></tr></thead>
      <tbody id="staffTable"></tbody></table>
    </div>
  </div>

  <!-- 통계 대시보드 패널 -->
  <div id="panel-stats" class="panel">
    <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
      <h3 style="flex:1">통계 대시보드</h3>
      <button class="btn btn-blue" onclick="loadStats()">새로고침</button>
      <button class="btn btn-red" onclick="resetStats()">통계 초기화</button>
    </div>

    <!-- 요약 카드 -->
    <div id="statCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px"></div>

    <!-- 만족도 분포 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="test-area">
        <h4 style="margin-bottom:12px">만족도 분포 (전체)</h4>
        <div id="satChart"></div>
      </div>
      <div class="test-area">
        <h4 style="margin-bottom:12px">만족도 현황</h4>
        <div id="satSummary"></div>
      </div>
    </div>

    <!-- 일별 추이 -->
    <div class="test-area" style="margin-bottom:20px">
      <h4 style="margin-bottom:12px">일별 추이 (최근 30일)</h4>
      <div id="dailyChart" style="overflow-x:auto"></div>
    </div>

    <!-- 일별 상세 테이블 -->
    <div class="test-area">
      <h4 style="margin-bottom:12px">일별 상세 데이터</h4>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>날짜</th><th>방문</th><th>질문</th><th>만족도 응답</th><th>평균 점수</th><th>미응답</th></tr></thead>
          <tbody id="dailyTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 테스트 패널 -->
  <div id="panel-test" class="panel">
    <div class="test-area">
      <h3>검색 테스트</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">실제 사용자가 질문할 법한 문장을 입력하면 FAQ/담당자 매칭 결과와 유사도 점수를 확인할 수 있습니다.</p>
      <div class="test-input">
        <input type="text" id="testQ" placeholder="예: 책 반납이 늦었는데 연체료가 걱정돼요" onkeydown="if(event.key==='Enter')doTest()">
        <button class="btn btn-blue" onclick="doTest()">테스트</button>
      </div>
      <div id="testResult"></div>
    </div>
  </div>
</div>

<!-- 업로드 진행 모달 -->
<div id="uploadModal" style="display:none">
  <div class="modal-bg">
    <div class="modal" style="max-width:400px;text-align:center">
      <h3 id="uploadTitle">업로드 중...</h3>
      <p id="uploadStatus" style="margin:10px 0;font-size:14px;color:var(--muted)"></p>
      <div class="progress-bar"><div class="fill" id="uploadProgress" style="width:0%"></div></div>
      <p id="uploadDetail" style="font-size:12px;color:var(--muted);margin-top:8px"></p>
    </div>
  </div>
</div>

<!-- 모달 컨테이너 -->
<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
const API = 'https://findjnlib.hdh1231.workers.dev';
let TOKEN = '';
let FAQS = [], COMMENTS = {}, RELATIONS = {}, STAFFS = [];

// ── 로그인 ──
function doLogin() {
  TOKEN = document.getElementById('pwInput').value;
  api('GET','/admin/faqs').then(function(d) {
    if (d.error) { toast('비밀번호가 틀렸습니다'); TOKEN=''; return; }
    FAQS = d.faqs || [];
    COMMENTS = d.comments || {};
    RELATIONS = d.relations || {};
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('mainWrap').style.display = 'block';
    renderFaqs();
    loadStaffs();
  }).catch(function() { toast('연결 실패'); TOKEN=''; });
}
function doLogout() { TOKEN=''; location.reload(); }

// ── API 호출 ──
function api(method, path, body) {
  var opts = { method: method, headers: { 'Authorization':'Bearer '+TOKEN, 'Content-Type':'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(function(r) { return r.json(); });
}

// ── 탭 전환 ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  if (el) el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── FAQ 렌더링 ──
function renderFaqs() {
  var q = (document.getElementById('faqSearch').value||'').toLowerCase();
  var filtered = FAQS.filter(function(f) { return !q || f.title.toLowerCase().includes(q) || f.id.includes(q); });
  var tb = document.getElementById('faqTable');
  tb.innerHTML = filtered.map(function(f) {
    var rels = (RELATIONS[f.id]||[]).map(function(r) { return '<span class="rel-tag">'+r+'</span>'; }).join('');
    var comment = COMMENTS[f.id] || '';
    var link = f.link ? '<a href="'+esc(f.link)+'" target="_blank" style="font-size:12px">링크</a>' : '-';
    return '<tr><td><span class="badge badge-teal">'+f.id+'</span></td><td style="max-width:250px">'+esc(f.title)+'</td><td style="max-width:200px;font-size:12px;color:#666">'+esc(comment).slice(0,30)+'</td><td><div class="rel-tags">'+rels+'</div></td><td>'+link+'</td><td><button class="btn btn-outline" onclick="openFaqModal(\''+f.id+'\')">수정</button> <button class="btn btn-red" onclick="deleteFaq(\''+f.id+'\')">삭제</button></td></tr>';
  }).join('');
}

// ── AI 안내 팁 HTML ──
var FAQ_TIP = '<div class="tip-box">'
  +'<b>AI 활용 팁</b> - 아래 명령어를 복사해서 ChatGPT/Gemini/Claude에 붙여넣으면 형식에 맞는 내용을 받을 수 있어요!<br><br>'
  +'<b>1. 제목 + 요약 한번에 만들기:</b>'
  +'<div class="prompt" onclick="copyText(this)">'
  +'종로도서관 AI 챗봇의 FAQ 항목을 만들어줘.\n'
  +'주제: [여기에 주제 입력, 예: 북카페 운영안내]\n\n'
  +'아래 형식으로 작성해줘:\n'
  +'- 제목: 간결한 서비스명 (괄호로 부가설명)\n'
  +'- 요약: 이용자에게 친근한 말투로 2~3문장, 구체적 정보(시간/장소/비용 등) 포함, 이모지 1개\n'
  +'- 공감 한마디: 20자 이내, 따뜻한 톤, 이모지 1개\n\n'
  +'예시:\n'
  +'제목: 북카페 이용안내(지하1층 쉼터)\n'
  +'요약: 지하 1층 인왕관 옆에 북카페가 있어요! 음료를 마시며 편하게 책을 읽을 수 있는 공간이에요.\n'
  +'공감 한마디: 커피 한잔과 함께 독서 어때요? ☕</div>'
  +'<b>2. 임베딩 보조 텍스트 만들기 (검색 정확도 향상):</b>'
  +'<div class="prompt" onclick="copyText(this)">'
  +'아래 FAQ 항목에 대해 사용자가 이 서비스를 찾을 때 쓸 수 있는 자연어 질문 5개를 만들어줘. 쉼표로 구분해줘.\n\n'
  +'제목: [FAQ 제목]\n'
  +'요약: [FAQ 요약]\n\n'
  +'예시 출력: 카페 어디 있어요, 도서관에서 커피 마실 수 있나요, 쉴 곳이 있나요, 음료 반입 가능한가요, 휴게공간이 있어요?</div>'
  +'<b>3. 꼬리질문도 AI에게:</b>'
  +'<div class="prompt" onclick="copyText(this)">'
  +'종로도서관 FAQ 목록에서 "[FAQ 제목]"과 가장 관련 있는 항목 3개를 골라줘.\n\n'
  +'[현재 FAQ 목록을 여기에 붙여넣기]</div>'
  +'</div>';

var STAFF_TIP = '<div class="tip-box">'
  +'<b>AI 활용 팁</b> - 담당자 정보를 AI에게 정리 요청하세요!<br><br>'
  +'<b>키워드 자동 생성:</b>'
  +'<div class="prompt" onclick="copyText(this)">'
  +'아래 담당자 정보를 보고, 시민이 이 담당자를 찾을 때 쓸 수 있는 검색 키워드를 10~15개 만들어줘. 쉼표로 구분해줘.\n\n'
  +'부서: [부서명]\n'
  +'직책: [직책]\n'
  +'담당업무: [업무 나열]\n\n'
  +'예시: 입찰,계약,공사,정보공개,보안,국민신문고,민원,산업안전,물품</div>'
  +'</div>';

// ── FAQ 모달 ──
function openFaqModal(id) {
  var faq = id ? FAQS.find(function(f){return f.id===id;}) : null;
  var isNew = !faq;
  var comment = faq ? (COMMENTS[faq.id]||'') : '';
  var rels = faq ? (RELATIONS[faq.id]||[]) : [];
  var relOpts = FAQS.filter(function(f){return !faq||f.id!==faq.id;}).map(function(f){return '<option value="'+f.id+'">'+f.id+' - '+esc(f.title)+'</option>';}).join('');

  document.getElementById('modalContainer').innerHTML = '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'
    +'<h3>'+(isNew?'FAQ 추가':'FAQ 수정 ('+id+')')+'</h3>'
    +'<div class="modal-split">'
    +'<div class="modal-left">'
    +'<div class="form-group"><label>ID (예: q071) - 자동 부여됨</label><input id="mFaqId" value="'+(faq?faq.id:nextFaqId())+'" '+(isNew?'':'readonly style="background:#f0f0f0"')+'></div>'
    +'<div class="form-group"><label>제목 <span style="color:var(--muted);font-weight:400">- 간결한 서비스명 (괄호로 부가설명)</span></label><input id="mFaqTitle" value="'+esc(faq?faq.title:'')+'" placeholder="예: 북카페 이용안내(지하1층 쉼터)"></div>'

function addRel() {
  var sel = document.getElementById('mRelSelect');
  var v = sel.value; if(!v) return;
  var cur = document.getElementById('mRels').value.split(',').filter(Boolean);
  if(cur.length>=3){toast('최대 3개까지');return;}
  if(cur.includes(v)) return;
  cur.push(v);
  document.getElementById('mRels').value = cur.join(',');
  document.getElementById('mRelTags').innerHTML = cur.map(function(r){return '<span class="rel-tag">'+r+' <span class="x" onclick="removeRel(\''+r+'\')">x</span></span>';}).join('');
  sel.value='';
}
function removeRel(id) {
  var cur = document.getElementById('mRels').value.split(',').filter(Boolean);
  cur = cur.filter(function(r){return r!==id;});
  document.getElementById('mRels').value = cur.join(',');
  document.getElementById('mRelTags').innerHTML = cur.map(function(r){return '<span class="rel-tag">'+r+' <span class="x" onclick="removeRel(\''+r+'\')">x</span></span>';}).join('');
}

function saveFaq() {
  var btn = document.getElementById('saveFaqBtn');
  btn.innerHTML = '<span class="loading"></span> 임베딩 생성 중...';
  btn.disabled = true;

  var faq = {
    id: document.getElementById('mFaqId').value.trim(),
    title: document.getElementById('mFaqTitle').value.trim(),
    summary: document.getElementById('mFaqSummary').value.trim(),
    link: document.getElementById('mFaqLink').value.trim() || null,
    embedText: document.getElementById('mFaqEmbedText').value.trim(),
  };
  var comment = document.getElementById('mFaqComment').value.trim();
  var rels = document.getElementById('mRels').value.split(',').filter(Boolean);

  api('POST','/admin/faq',{ faq: faq, comment: comment, relations: rels }).then(function(d) {
    if(d.ok) {
      toast('저장 완료! 임베딩 '+d.embeddingDim+'차원 생성됨');
      var idx = FAQS.findIndex(function(f){return f.id===faq.id;});
      if(idx>=0) { Object.assign(FAQS[idx], faq); } else { FAQS.push(faq); }
      COMMENTS[faq.id] = comment;
      RELATIONS[faq.id] = rels;
      renderFaqs();
      closeModal();
    } else {
      toast('오류: '+(d.error||'알 수 없는 오류'));
      btn.innerHTML = '저장 (임베딩 자동생성)';
      btn.disabled = false;
    }
  });

function deleteFaq(id) {
  if(!confirm(id+' FAQ를 삭제하시겠습니까?')) return;
  api('DELETE','/admin/faq',{id:id}).then(function(d) {
    if(d.ok) {
      FAQS = FAQS.filter(function(f){return f.id!==id;});
      delete COMMENTS[id];
      delete RELATIONS[id];
      renderFaqs();
      toast(id+' 삭제 완료');
    }
  });
}

function nextFaqId() {
  var nums = FAQS.map(function(f){return parseInt(f.id.replace('q',''));}).filter(function(n){return !isNaN(n);});
  var next = Math.max.apply(null, nums.concat([0]))+1;
  return 'q'+String(next).padStart(3,'0');
}

function csvEsc(val) {
  var s = String(val||'');
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadFaqCsv() {
  var header = 'id,제목,요약설명,링크,공감한마디,임베딩보조텍스트,꼬리질문1,꼬리질문2,꼬리질문3';
  var rows = FAQS.map(function(f) {
    var rels = RELATIONS[f.id] || [];
    return [f.id, f.title, f.summary, f.link||'', COMMENTS[f.id]||'', f.embedText||'', rels[0]||'', rels[1]||'', rels[2]||''].map(csvEsc).join(',');
  });
  var csv = '\uFEFF' + header + '\n' + rows.join('\n');
  downloadFile(csv, 'faq_data.csv', 'text/csv;charset=utf-8');
  toast('FAQ CSV 다운로드 완료 ('+FAQS.length+'건)');
}

function downloadStaffCsv() {
  var header = 'id,부서,직책,이름,전화,키워드,담당업무(|구분)';
  var rows = STAFFS.map(function(s) {
    return [s.id, s.dept, s.role, s.name, s.tel, s.keywords, (s.duties||[]).join('|')].map(csvEsc).join(',');
  });
  var csv = '\uFEFF' + header + '\n' + rows.join('\n');
  downloadFile(csv, 'staff_data.csv', 'text/csv;charset=utf-8');
  toast('담당자 CSV 다운로드 완료 ('+STAFFS.length+'건)');
}

function downloadFile(content, filename, type) {
  var blob = new Blob([content], {type: type});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function parseCsv(text) {
  var lines = [];
  var current = '';
  var inQuote = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '"') {
      if (inQuote && text[i+1] === '"') { current += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (ch === ',' && !inQuote) {
      lines.push(current); current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuote) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      lines.push(current); current = '';
      lines.push(null); // row separator
    } else {
      current += ch;
    }
  }
  lines.push(current);
  // split into rows
  var rows = [[]];
  for (var j = 0; j < lines.length; j++) {
    if (lines[j] === null) { rows.push([]); }
    else { rows[rows.length-1].push(lines[j]); }
  }
  return rows.filter(function(r) { return r.length > 1 || (r.length === 1 && r[0].trim()); });
}

function uploadFaqCsv(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var rows = parseCsv(e.target.result);
    if (rows.length < 2) { toast('CSV에 데이터가 없습니다'); return; }
    var data = rows.slice(1); // skip header
    var total = data.length;
    if (!confirm(total+'개 FAQ를 업로드합니다. 각 항목의 임베딩이 자동 생성됩니다. 진행하시겠습니까?')) {
      input.value = ''; return;
    }
    showUploadProgress('FAQ 업로드 중', 0, total);
    uploadFaqBatch(data, 0, total);
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

function uploadFaqBatch(data, idx, total) {
  if (idx >= data.length) {
    hideUploadProgress();
    toast('FAQ 업로드 완료! '+total+'건 처리됨 (임베딩 모두 생성)');
    api('GET','/admin/faqs').then(function(d) {
      FAQS = d.faqs || [];
      COMMENTS = d.comments || {};
      RELATIONS = d.relations || {};
      renderFaqs();
    });
    return;
  }
  var row = data[idx];
  // id,제목,요약설명,링크,공감한마디,임베딩보조텍스트,꼬리질문1,꼬리질문2,꼬리질문3
  var faq = {
    id: (row[0]||'').trim(),
    title: (row[1]||'').trim(),
    summary: (row[2]||'').trim(),
    link: (row[3]||'').trim() || null,
    embedText: (row[5]||'').trim(),
  };
  var comment = (row[4]||'').trim();
  var rels = [row[6],row[7],row[8]].map(function(r){return (r||'').trim();}).filter(Boolean);

  if (!faq.id || !faq.title) {
    updateUploadProgress(idx+1, data.length, faq.id + ' 건너뜀 (ID/제목 없음)');
    uploadFaqBatch(data, idx+1, data.length);
    return;
  }
  updateUploadProgress(idx+1, data.length, faq.id + ' ' + faq.title);
  api('POST','/admin/faq',{faq:faq, comment:comment, relations:rels}).then(function() {
    uploadFaqBatch(data, idx+1, data.length);
  }).catch(function() {
    updateUploadProgress(idx+1, data.length, faq.id + ' 오류 발생');
    uploadFaqBatch(data, idx+1, data.length);
  });
}

function uploadStaffCsv(input) {

    var rows = parseCsv(e.target.result);

    var data = rows.slice(1);
    var total = data.length;
    if (!confirm(total+'명 담당자를 업로드합니다. 각 항목의 임베딩이 자동 생성됩니다. 진행하시겠습니까?')) {

function renderStats(d) {

  var noResponse = Math.max(0, (all.questions || 0) - satTotal);

  // 요약 카드
  var cards = [
    {label:'총 방문자', value: fmt(all.visits || 0), icon:'👥', color:'#3182ff'},
    {label:'총 질문 수', value: fmt(all.questions || 0), icon:'💬', color:'#00cfc0'},
    {label:'만족도 응답', value: fmt(satTotal), icon:'📊', color:'#ed8936'},
    {label:'미응답', value: fmt(noResponse), icon:'🔕', color:'#e53e3e'},
    {label:'평균 만족도', value: satAvg + ' / 5.0', icon: satAvg >= 4 ? '🥰' : satAvg >= 3 ? '😊' : '😐', color:'#9f7aea'},
    {label:'운영 일수', value: d.totalDays + '일', icon:'📅', color:'#38a169'},
  ];
  document.getElementById('statCards').innerHTML = cards.map(function(c) {
    return '<div style="background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid '+c.color+'">'
      +'<div style="font-size:2em;margin-bottom:4px">'+c.icon+'</div>'
      +'<div style="font-size:1.5em;font-weight:900;color:var(--navy)">'+c.value+'</div>'
      +'<div style="font-size:.82em;color:var(--muted);margin-top:2px">'+c.label+'</div></div>';
  }).join('');

  // 만족도 분포 바 차트
  var satLabels = ['매우 만족','만족','보통','불만족','매우 불만족'];
  var satEmojis = ['🥰','😊','😐','😟','😤'];
  var satColors = ['#00cfc0','#38a169','#ed8936','#e53e3e','#c53030'];
  var satOrder = [4,3,2,1,0]; // 5점→1점 순
  var maxCount = Math.max.apply(null, satCounts.concat([1]));
  var chartHtml = '';
  for (var si = 0; si < 5; si++) {
    var scoreIdx = satOrder[si]; // KV index (0=1점, 4=5점)
    var count = satCounts[scoreIdx];
    var pct = satTotal > 0 ? Math.round((count / satTotal) * 100) : 0;
    var barW = Math.max(2, Math.round((count / maxCount) * 100));
    chartHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<div style="width:90px;font-size:.85em;text-align:right">'+satEmojis[si]+' '+satLabels[si]+'</div>'
      +'<div style="flex:1;background:#f0f0f0;border-radius:4px;height:22px;overflow:hidden">'
      +'<div style="width:'+barW+'%;height:100%;background:'+satColors[si]+';border-radius:4px;transition:width .5s"></div></div>'
      +'<div style="width:60px;font-size:.85em;font-weight:700">'+count+'건 ('+pct+'%)</div></div>';
  }
  document.getElementById('satChart').innerHTML = chartHtml;

  // 만족도 현황
  var sumHtml = '<div style="text-align:center;padding:20px">'
    +'<div style="font-size:3.5em">'+( satAvg >= 4.5 ? '🥰' : satAvg >= 3.5 ? '😊' : satAvg >= 2.5 ? '😐' : satAvg >= 1.5 ? '😟' : satAvg > 0 ? '😤' : '➖')+'</div>'
    +'<div style="font-size:2.2em;font-weight:900;color:var(--navy);margin:8px 0">'+satAvg+'<span style="font-size:.5em;color:var(--muted)"> / 5.0</span></div>'
    +'<div style="font-size:.9em;color:var(--muted)">총 '+fmt(satTotal)+'건 응답</div>'
    +'<div style="margin-top:12px;font-size:.85em;color:var(--muted)">'
    +'응답률: '+(all.questions > 0 ? Math.round((satTotal / all.questions) * 100) : 0)+'%'
    +' ('+fmt(satTotal)+'/'+fmt(all.questions || 0)+'건)</div></div>';
  document.getElementById('satSummary').innerHTML = sumHtml;

  // 일별 추이 차트 (바 차트)
  if (daily.length === 0) {
    document.getElementById('dailyChart').innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px">아직 데이터가 없습니다</div>';
  } else {
    var maxVisit = Math.max.apply(null, daily.map(function(d){return Math.max(d.visits||0, d.questions||0);}).concat([1]));
    var barHtml = '<div style="display:flex;align-items:flex-end;gap:3px;height:160px;padding-bottom:28px;position:relative">';
    daily.forEach(function(day) {
      var vh = Math.max(2, Math.round(((day.visits||0)/maxVisit)*120));
      var qh = Math.max(2, Math.round(((day.questions||0)/maxVisit)*120));
      var dateLabel = day.date.slice(5); // MM-DD
      barHtml += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:28px">'
        +'<div style="display:flex;gap:2px;align-items:flex-end;height:120px">'
        +'<div title="방문 '+(day.visits||0)+'" style="width:10px;height:'+vh+'px;background:#3182ff;border-radius:2px 2px 0 0;opacity:.7"></div>'
        +'<div title="질문 '+(day.questions||0)+'" style="width:10px;height:'+qh+'px;background:#00cfc0;border-radius:2px 2px 0 0;opacity:.7"></div></div>'
        +'<div style="font-size:.65em;color:var(--muted);margin-top:4px;transform:rotate(-45deg);white-space:nowrap">'+dateLabel+'</div></div>';
    });
    barHtml += '</div>';
    barHtml += '<div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:.78em;color:var(--muted)">'
      +'<span><span style="display:inline-block;width:10px;height:10px;background:#3182ff;border-radius:2px;vertical-align:middle;margin-right:4px"></span>방문</span>'
      +'<span><span style="display:inline-block;width:10px;height:10px;background:#00cfc0;border-radius:2px;vertical-align:middle;margin-right:4px"></span>질문</span></div>';
    document.getElementById('dailyChart').innerHTML = barHtml;
  }

  // 일별 상세 테이블 (최신순)
  var reversed = daily.slice().reverse();
  document.getElementById('dailyTable').innerHTML = reversed.map(function(day) {
    var dayAvg = day.satTotal > 0 ? (day.satSum / day.satTotal).toFixed(1) : '-';
    var dayNoResp = Math.max(0, (day.questions||0) - (day.satTotal||0));
    return '<tr><td>'+day.date+'</td><td>'+fmt(day.visits||0)+'</td><td>'+fmt(day.questions||0)+'</td>'
      +'<td>'+fmt(day.satTotal||0)+'</td><td>'+dayAvg+'</td><td>'+fmt(dayNoResp)+'</td></tr>';
  }).join('');
}

function resetStats() {
  if (!confirm('모든 통계 데이터를 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  api('DELETE', '/admin/stats').then(function(d) {
    if (d.ok) { toast('통계 초기화 완료'); loadStats(); }
    else toast('오류: ' + (d.error || ''));
  });
}

function fmt(n) {
  return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ── 마이그레이션 ──
function doMigrate() {
  if(!confirm('기존 코드 데이터를 KV로 마이그레이션합니다. 현재 KV 데이터가 덮어씌워집니다. 진행하시겠습니까?')) return;
  toast('마이그레이션 진행 중...');
  api('POST','/admin/migrate',{}).then(function(d) {
    if(d.ok) {
      toast('마이그레이션 완료! FAQ '+d.faqs+'개, 담당자 '+d.staffs+'개');
      location.reload();
    } else {
      toast('오류: '+(d.error||''));
    }
  });
}

// ── 유틸 ──
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  var d = document.createElement('div');
  d.className = 'toast';
  d.textContent = msg;
  document.getElementById('toastContainer').appendChild(d);
  setTimeout(function() { d.remove(); }, 3000);
}
function copyText(el) {
  var text = el.innerText.replace('클릭하면 복사', '').trim();
  navigator.clipboard.writeText(text).then(function() { toast('클립보드에 복사됨!'); });
}
</script>
</body>
</html>
