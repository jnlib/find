<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>종로도서관 AI 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#07213a;--teal:#00cfc0;--teal2:#00a898;--blue:#3182ff;--muted:#7a9ab8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#eef3ff,#e8f6f4);display:flex;flex-direction:column;align-items:center}
.shell{width:100%;max-width:560px;height:100vh;height:100dvh;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(7,33,58,.1)}
.hdr{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,.97);border-bottom:1px solid rgba(0,207,192,.12);position:relative}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,transparent,var(--teal) 20%,var(--blue) 80%,transparent);background-size:200%;animation:flow 3s linear infinite}

.hdr-av{width:40px;height:40px;border-radius:50%;background:rgba(0,207,192,.08);border:2px solid rgba(0,207,192,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.hdr-av img{width:30px;height:30px;object-fit:contain;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hdr-title{font-size:1.05em;font-weight:900;color:var(--navy)}
.hdr-sub{font-size:.75em;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 6px #00e676;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.chat{flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:rgba(0,207,192,.25);border-radius:3px}
.brow{display:flex;align-items:flex-end;gap:9px}
.brow.usr{flex-direction:row-reverse}
.bav{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:rgba(0,207,192,.08);border:1.5px solid rgba(0,207,192,.15);display:flex;align-items:center;justify-content:center;overflow:hidden}
.bav img{width:26px;height:26px;object-fit:contain}
.bav.u{background:linear-gradient(135deg,#07213a,#0a3060);font-size:.82em;color:rgba(255,255,255,.85);font-weight:700}
.bbl{max-width:86%;padding:14px 17px;border-radius:18px;font-size:1em;line-height:1.85;color:var(--navy);animation:popIn .35s cubic-bezier(.22,.68,0,1.2)}
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.bbl.ai{background:#fff;border:1px solid rgba(0,207,192,.15);border-bottom-left-radius:5px;box-shadow:0 3px 16px rgba(7,33,58,.07)}
.bbl.usr{background:linear-gradient(135deg,#00c4b4,#0060d0);color:#fff;border-bottom-right-radius:5px}
.fcard{background:linear-gradient(135deg,#f0f7ff,#f8fbff);border:1.5px solid rgba(49,130,255,.18);border-radius:14px;overflow:hidden;margin-top:12px}
.fbar{height:3px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.fbody{padding:15px 17px}
.flbl{font-size:.72em;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:7px}
.ftitle{font-size:1.05em;font-weight:900;color:var(--navy);margin-bottom:9px}
.fsum{font-size:.95em;color:#2a4a68;line-height:1.9}
.flink{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:9px 20px;background:linear-gradient(135deg,#0075d8,#00a898);color:#fff;border-radius:50px;font-size:.85em;font-weight:700;text-decoration:none;box-shadow:0 3px 12px rgba(0,150,200,.28)}
.scard{background:#fff;border:1.5px solid rgba(0,207,192,.2);border-radius:12px;overflow:hidden;margin-top:10px}
.sbar{height:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.sbody{padding:13px 16px;display:flex;align-items:center;gap:12px}
.sico{width:42px;height:42px;border-radius:50%;background:#eef6ff;border:1.5px solid rgba(0,207,192,.2);display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0}
.sinfo{flex:1}
.sdept{font-size:.7em;color:var(--muted);margin-bottom:3px}
.sname{font-size:1em;font-weight:900;color:var(--navy)}
.srole{font-size:.72em;color:var(--muted);margin-top:2px}
.stel{display:flex;align-items:center;gap:6px;background:#f4f8ff;border-radius:8px;padding:8px 12px;margin-left:auto;flex-shrink:0;border:1px solid rgba(0,207,192,.12)}
.stelnum{font-size:.95em;font-weight:900;color:var(--navy);letter-spacing:.04em}
.fback{background:#fff8f0;border:1.5px solid rgba(245,160,0,.2);border-radius:12px;padding:15px 17px;margin-top:10px;text-align:center}
.fbacktel{font-size:1.3em;font-weight:900;color:var(--navy);letter-spacing:.06em;margin-top:4px}
.fbacksub{font-size:.72em;color:var(--muted);margin-top:3px}
.lrow{display:flex;align-items:flex-end;gap:9px}
.lbub{background:#fff;border:1px solid rgba(0,207,192,.15);border-radius:18px;border-bottom-left-radius:5px;padding:16px 20px;box-shadow:0 3px 16px rgba(7,33,58,.07);display:flex;flex-direction:column;align-items:center;gap:10px;min-width:180px}
.lring{position:relative;width:58px;height:58px}
.lring img{width:58px;height:58px;object-fit:contain;position:absolute;inset:0;animation:bounce 1.1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-9px) scale(1.06)}70%{transform:translateY(-3px) scale(.97)}}
.lring-c{position:absolute;inset:-7px;border-radius:50%;border:2.5px solid transparent;background:linear-gradient(white,white) padding-box,conic-gradient(from 0deg,rgba(0,207,192,.08),#00cfc0 50%,#3182ff 80%,rgba(0,207,192,.08)) border-box;animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-size:.85em;color:var(--teal2);font-weight:700;text-align:center}
.ldots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--teal2);margin:0 2px;animation:dot .9s ease-in-out infinite}
.ldots span:nth-child(2){animation-delay:.18s}
.ldots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.fadein{opacity:0;transition:opacity .5s ease}
.fadein.show{opacity:1}
.sug-wrap{margin-top:12px}
.sug-label{font-size:.75em;color:var(--muted);margin-bottom:8px;font-weight:700}
.sug-row{display:flex;flex-wrap:wrap;gap:7px}
.sug-btn{padding:9px 15px;background:rgba(49,130,255,.06);border:1.5px solid rgba(49,130,255,.18);border-radius:50px;font-size:.88em;color:var(--blue);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:left;line-height:1.4}
.sug-btn:hover{background:rgba(49,130,255,.12);transform:scale(1.02)}
.iarea{flex-shrink:0;padding:10px 14px 14px;background:rgba(255,255,255,.97);border-top:1px solid rgba(0,207,192,.1)}
.irow{display:flex;gap:8px;align-items:flex-end}
.ibox{flex:1;padding:13px 15px;border:2px solid rgba(0,207,192,.2);border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:1em;color:var(--navy);background:#f8fbff;outline:none;resize:none;max-height:100px;transition:border-color .15s,box-shadow .15s;line-height:1.5}
.ibox:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,207,192,.1);background:#fff}
.ibox::placeholder{color:rgba(7,33,58,.28)}
.sbtn{width:46px;height:46px;flex-shrink:0;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#00c4b4,#0060d0);color:#fff;font-size:1.2em;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,150,200,.32);transition:transform .12s}
.sbtn:hover{transform:scale(1.07)}
.sbtn:active{transform:scale(.93)}
.sbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.ihint{font-size:.7em;color:rgba(7,33,58,.25);text-align:center;margin-top:6px}
.sat-wrap{margin-top:4px}
.sat-q{font-size:.9em;font-weight:700;color:var(--navy);margin-bottom:10px;line-height:1.6}
.sat-row{display:flex;gap:6px;flex-wrap:wrap}
.sat-btn{flex:1;min-width:0;padding:10px 4px;border:2px solid rgba(0,207,192,.2);border-radius:12px;background:#fff;cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif;transition:all .2s;font-size:.82em;line-height:1.4}
.sat-btn:hover{border-color:var(--teal);background:rgba(0,207,192,.06);transform:scale(1.04)}
.sat-btn:active{transform:scale(.95)}
.sat-btn .sat-emoji{font-size:1.5em;display:block;margin-bottom:3px}
.sat-btn .sat-label{font-size:.78em;color:var(--muted);font-weight:600}
.sat-btn.selected{border-color:var(--teal);background:linear-gradient(135deg,rgba(0,207,192,.12),rgba(49,130,255,.08));box-shadow:0 2px 12px rgba(0,207,192,.2)}
.sat-btn.selected .sat-label{color:var(--teal2);font-weight:900}
.sat-done{text-align:center;padding:8px;font-size:.88em;color:var(--teal2);font-weight:700}
</style>
</head>
<body>

// 공감멘트 타이핑 → 카드 구조 fadeIn → summary 타이핑 → 링크/추천칩 fadeIn
function addAIResult(empathy, cardsHtml, faqId) {
  var r = document.createElement('div');
  r.className = 'brow';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>';
  r.appendChild(bbl);
  chat.appendChild(r);
  scrollB();

  // 1단계: 공감멘트 타이핑
  var i = 0;
  var cursor = document.createElement('span');
  cursor.className = 'cursor';
  bbl.appendChild(cursor);

  var t = setInterval(function() {
    if (i >= empathy.length) {
      clearInterval(t);
      cursor.remove();

      if (!cardsHtml) {
        // 카드 없을 때 (fallback)
        if (faqId && REL[faqId]) {
          var sw = document.createElement('div');
          sw.className = 'fadein';
          sw.innerHTML = makeSugHtml(faqId);
          bbl.appendChild(sw);
          setTimeout(function() { sw.classList.add('show'); scrollB(); showSatisfaction(); }, 300);
        } else { showSatisfaction(); }
        return;
      }

      // 2단계: 카드 구조만 먼저 fadeIn (summary는 비워둠)
      var tmp = document.createElement('div');
      tmp.innerHTML = cardsHtml;

      // fsum 찾아서 텍스트 추출 후 비워두기
      var fsumEl = tmp.querySelector('.fsum');
      var summaryText = fsumEl ? (fsumEl.textContent || '') : '';
      if (fsumEl) fsumEl.textContent = '';

      // flink, scard는 숨겨두기
      var flinkEl = tmp.querySelector('.flink');
      var scardEl = tmp.querySelector('.scard');
      if (flinkEl) flinkEl.style.opacity = '0';
      if (scardEl) scardEl.style.opacity = '0';

      var cw = document.createElement('div');
      cw.className = 'fadein';
      cw.appendChild(tmp.firstChild || tmp);
      bbl.appendChild(cw);
      scrollB();

      setTimeout(function() {
        cw.classList.add('show');
        scrollB();

        // 3단계: summary 타이핑
        if (fsumEl && summaryText) {
          var si = 0;
          var scursor = document.createElement('span');
          scursor.className = 'cursor';
          fsumEl.appendChild(scursor);

          var st = setInterval(function() {
            if (si >= summaryText.length) {
              clearInterval(st);
              scursor.remove();

              // 4단계: 링크/담당자 fadeIn
              if (flinkEl) {
                flinkEl.style.transition = 'opacity .4s ease';
                setTimeout(function() { flinkEl.style.opacity = '1'; scrollB(); }, 100);
              }
              if (scardEl) {
                scardEl.style.transition = 'opacity .4s ease';
                setTimeout(function() { scardEl.style.opacity = '1'; scrollB(); }, 200);
              }

              // 5단계: 추천칩 fadeIn
              if (faqId && REL[faqId]) {
                var sw = document.createElement('div');
                sw.className = 'fadein';
                sw.innerHTML = makeSugHtml(faqId);
                bbl.appendChild(sw);
                setTimeout(function() { sw.classList.add('show'); scrollB(); showSatisfaction(); }, 400);
              }
              if (!faqId || !REL[faqId]) showSatisfaction();
              return;
            }
            fsumEl.insertBefore(document.createTextNode(summaryText[si++]), scursor);
            scrollB();
          }, 28);
        } else {
          // summary 없으면 바로 링크/추천칩
          if (flinkEl) { flinkEl.style.transition='opacity .4s'; setTimeout(function(){flinkEl.style.opacity='1';},100); }
          if (scardEl) { scardEl.style.transition='opacity .4s'; setTimeout(function(){scardEl.style.opacity='1';},200); }
          if (faqId && REL[faqId]) {
            var sw2 = document.createElement('div');
            sw2.className = 'fadein';
            sw2.innerHTML = makeSugHtml(faqId);
            bbl.appendChild(sw2);
            setTimeout(function() { sw2.classList.add('show'); scrollB(); showSatisfaction(); }, 400);
          } else { showSatisfaction(); }
        }
      }, 80);
      return;
    }
    bbl.insertBefore(document.createTextNode(empathy[i++]), cursor);
    scrollB();
  }, 22);
}

function makeSugHtml(faqId) {
  var ids = REL[faqId] || [];
  if (!ids.length) return '';
  var chips = '';
  ids.forEach(function(id) {
    var label = FAQ_Q[id] || id;
    chips += '<button class="sug-btn" data-faqid="' + id + '">' + esc(label) + '</button>';
  });
  return '<div class="sug-wrap"><div class="sug-label">🤖 AI가 연관 내용을 찾았어요</div><div class="sug-row">' + chips + '</div></div>';
}

  ibox.style.height = 'auto';
  addUser(q);
  doSearch(q);
}

async function doSearch(q) {
  sendStat('question');
  sbtn.disabled = true;
  var lr = addLoad();
  try {
    var res = await fetch(W, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q}) });
    var txt = await res.text();
    if (lr._stop) lr._stop(); lr.remove();
    if (!res.ok) { console.debug('[chat]', res.status, txt.slice(0,200)); addAI('일시적인 오류가 발생했어요 😥'); return; }
    var data = JSON.parse(txt);
    if (data.faq) CACHE[data.faq.id] = data.faq;
    renderResult(data, q);
  } catch(e) {
    console.debug('[chat]', e.message);
    if (lr._stop) lr._stop(); lr.remove();
    addAI('일시적인 오류가 발생했어요 😥');
  } finally { sbtn.disabled = false; ibox.focus(); }
}

async function fetchDirect(id) {
  if (CACHE[id]) { renderFaq(CACHE[id]); return; }
  sbtn.disabled = true;
  var lr = addLoad();
  try {
    var res = await fetch(W, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:'__direct__' + id}) });
    var data = await res.json();
    if (lr._stop) lr._stop(); lr.remove();
    if (data.faq) { CACHE[data.faq.id] = data.faq; renderFaq(data.faq); }
  } catch(e) {
    console.debug('[fetchDirect]', e.message);
    if (lr._stop) lr._stop(); lr.remove();
  } finally { sbtn.disabled = false; ibox.focus(); }
}

function renderFaq(faq) {
  var lb = faq.link ? '<a class="flink" href="' + esc(faq.link) + '" target="_blank">🔗 홈페이지에서 자세히 보기</a>' : '';
  var card = '<div class="fcard"><div class="fbar"></div><div class="fbody">'
    + '<div class="flbl">📚 관련 안내</div>'
    + '<div class="ftitle">' + esc(faq.title) + '</div>'
    + '<div class="fsum">' + esc(faq.summary) + '</div>'
    + lb + '</div></div>';
  var comment = FAQ_COMMENT[faq.id] || '안내드릴게요! 😊';
  addAIResult(comment, card, faq.id);
}

function renderResult(data, q) {
  var staff = data.staff, faq = data.faq;
  // 직접 질문: Gemini가 생성한 comment 사용
  // 꼬리물기: FAQ_COMMENT 미리 세팅값 사용 (renderFaq에서 처리)
  var empathy = data.comment || '안내드릴게요! 😊';

  if (!staff && !faq) {
    // 매칭 안 됨 → comment 타이핑 후 안내실 카드
    addAIResult(empathy,
      '<div class="fback"><div style="font-size:.82em;color:var(--muted)">안내실로 문의해 주세요</div>'
      + '<div class="fbacktel">02-721-0729</div><div class="fbacksub">평일 09:00 – 18:00</div></div>', null);
    return;
  }
  var cards = '';
  if (faq) {
    var lb = faq.link ? '<a class="flink" href="' + esc(faq.link) + '" target="_blank">🔗 홈페이지에서 자세히 보기</a>' : '';
    cards += '<div class="fcard"><div class="fbar"></div><div class="fbody">'
      + '<div class="flbl">📚 관련 안내</div>'
      + '<div class="ftitle">' + esc(faq.title) + '</div>'
      + '<div class="fsum">' + esc(faq.summary) + '</div>'
      + lb + '</div></div>';
  }
  if (staff) {
    cards += '<div class="scard"><div class="sbar"></div><div class="sbody">'
      + '<div class="sico">🧑</div><div class="sinfo">'
      + '<div class="sdept">' + esc(staff.dept) + '</div>'
      + '<div class="sname">' + esc(staff.name) + '</div>'
      + '<div class="srole">' + esc(staff.role) + '</div>'
      + '</div><div class="stel"><span style="font-size:.8em;margin-right:3px">☎</span>'
      + '<span class="stelnum">02-' + esc(staff.tel) + '</span></div></div></div>';
  }
  addAIResult(empathy, cards, faq ? faq.id : null);
}

// ── 만족도 조사 ──
var SAT_EMOJIS = ['🥰','😊','😐','😟','😤'];
var SAT_LABELS = ['매우 만족','만족','보통','불만족','매우 불만족'];
var SAT_SCORES = [5, 4, 3, 2, 1];
var SAT_THANKS = [
  '정말 감사합니다! 🎉 큰 힘이 됩니다!',
  '감사합니다! 😊 앞으로도 좋은 안내 드릴게요!',
  '감사합니다 😊 더 유용한 안내를 드릴 수 있도록 노력할게요!',
  '의견 감사합니다 🙏 부족한 부분을 개선하겠습니다!',
  '소중한 의견 감사합니다 🙏 더 나은 서비스가 될 수 있도록 노력할게요!'
];
var satShown = false; // 중복 방지

function showSatisfaction() {
  if (satShown) return;
  satShown = true;
  setTimeout(function() { satShown = false; }, 3000); // 3초 후 다시 가능

  setTimeout(function() {
    var r = document.createElement('div');
    r.className = 'brow';
    var bbl = document.createElement('div');
    bbl.className = 'bbl ai';
    r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>';

    var satId = 'sat-' + Date.now();
    var btns = '';
    for (var i = 0; i < 5; i++) {
      btns += '<button class="sat-btn" data-satid="' + satId + '" data-idx="' + i + '">'
        + '<span class="sat-emoji">' + SAT_EMOJIS[i] + '</span>'
        + '<span class="sat-label">' + SAT_LABELS[i] + '</span></button>';
    }

    bbl.innerHTML = '<div class="sat-wrap">'
      + '<div class="sat-q">답변이 도움이 되셨나요? 😊<br><span style="font-size:.82em;font-weight:400;color:var(--muted)">터치 한번이면 끝! 여러분의 의견이 큰 힘이 됩니다</span></div>'
      + '<div class="sat-row" id="' + satId + '">' + btns + '</div></div>';

    r.appendChild(bbl);
    chat.appendChild(r);
    scrollB();
  }, 800);
}

// 만족도 버튼 클릭 처리 (이벤트 위임)
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.sat-btn[data-idx]');
  if (!btn) return;
  var idx = parseInt(btn.getAttribute('data-idx'));
  var score = SAT_SCORES[idx];
  var satId = btn.getAttribute('data-satid');
  var row = document.getElementById(satId);
  if (!row || row.dataset.done) return;
  row.dataset.done = '1';

  btn.classList.add('selected');
  addUser(SAT_EMOJIS[idx] + ' ' + SAT_LABELS[idx]);

  setTimeout(function() {
    row.querySelectorAll('.sat-btn').forEach(function(b) {
      b.style.pointerEvents = 'none';
      if (!b.classList.contains('selected')) b.style.opacity = '.4';
    });
    addAI(SAT_THANKS[idx]);
    scrollB();
    sendStat('satisfaction', {score: score});
  }, 400);
});

// 입력으로 만족도 응답 처리
var origSend = send;
send = function() {
  var q = ibox.value.trim();
  var activeSat = document.querySelector('.sat-row:not([data-done])');
  if (activeSat) {
    var matchIdx = -1;
    // 숫자 입력: 1=매우만족, 5=매우불만족
    if (/^[1-5]$/.test(q)) { matchIdx = parseInt(q) - 1; }
    // 텍스트/이모지 매칭
    if (matchIdx < 0) {
      for (var i = 0; i < SAT_LABELS.length; i++) {
        if (q === SAT_LABELS[i] || q === SAT_EMOJIS[i]) { matchIdx = i; break; }
      }
    }
    if (matchIdx >= 0) {
      ibox.value = '';
      ibox.style.height = 'auto';
      activeSat.dataset.done = '1';
      var targetBtn = activeSat.querySelector('[data-idx="' + matchIdx + '"]');
      if (targetBtn) targetBtn.classList.add('selected');
      activeSat.querySelectorAll('.sat-btn').forEach(function(b) {
        b.style.pointerEvents = 'none';
        if (!b.classList.contains('selected')) b.style.opacity = '.4';
      });
      addUser(SAT_EMOJIS[matchIdx] + ' ' + SAT_LABELS[matchIdx]);
      setTimeout(function() {
        addAI(SAT_THANKS[matchIdx]);
        scrollB();
        sendStat('satisfaction', {score: SAT_SCORES[matchIdx]});
      }, 400);
      return;
    }
  }
  origSend();
};

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
