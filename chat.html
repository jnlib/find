:root{--navy:#07213a;--teal:#00cfc0;--teal2:#00a898;--blue:#3182ff;--muted:#7a9ab8}

html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#eef3ff,#e8f6f4);display:flex;flex-direction:column;align-items:center}
.shell{width:100%;max-width:560px;height:100vh;height:100dvh;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(7,33,58,.1)}

.hdr-av img{width:30px;height:30px;object-fit:contain;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.hdr-title{font-size:1.05em;font-weight:900;color:var(--navy)}
.hdr-sub{font-size:.75em;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#00e676;box-shadow:0 0 6px #00e676;animation:pulse 1.6s infinite}

.chat{flex:1;overflow-y:auto;padding:18px 14px 10px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}

.fbar{height:3px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.fbody{padding:15px 17px}
.flbl{font-size:.72em;color:var(--muted);font-weight:700;letter-spacing:.08em;margin-bottom:7px}
.ftitle{font-size:1.05em;font-weight:900;color:var(--navy);margin-bottom:9px}
.fsum{font-size:.95em;color:#2a4a68;line-height:1.9}

.scard{background:#fff;border:1.5px solid rgba(0,207,192,.2);border-radius:12px;overflow:hidden;margin-top:10px}
.sbar{height:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.sbody{padding:13px 16px;display:flex;align-items:center;gap:12px}
.sico{width:42px;height:42px;border-radius:50%;background:#eef6ff;border:1.5px solid rgba(0,207,192,.2);display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0}
.sinfo{flex:1}
.sdept{font-size:.7em;color:var(--muted);margin-bottom:3px}
.sname{font-size:1em;font-weight:900;color:var(--navy)}
.srole{font-size:.72em;color:var(--muted);margin-top:2px}
.stel{display:flex;align-items:center;gap:6px;background:#f4f8ff;border-radius:8px;padding:8px 12px;margin-left:auto;flex-shrink:0;border:1px solid rgba(0,207,192,.12)}

.lmsg{font-size:.85em;color:var(--teal2);font-weight:700;text-align:center}
.ldots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--teal2);margin:0 2px;animation:dot .9s ease-in-out infinite}
.ldots span:nth-child(2){animation-delay:.18s}
.ldots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.fadein{opacity:0;transition:opacity .5s ease}
.fadein.show{opacity:1}
.sug-wrap{margin-top:12px}
.sug-label{font-size:.75em;color:var(--muted);margin-bottom:8px;font-weight:700}
.sug-row{display:flex;flex-wrap:wrap;gap:7px}

.iarea{flex-shrink:0;padding:10px 14px 14px;background:rgba(255,255,255,.97);border-top:1px solid rgba(0,207,192,.1)}
.irow{display:flex;gap:8px;align-items:flex-end}

// 첫화면 예시질문
var EXAMPLES = [
  {t:'📚 읽고 싶은 책이 있는데 도서관에 없어요', id:'q012'},
  {t:'😰 책을 늦게 반납했는데 연체료가 너무 걱정돼요', id:'q060'},
  {t:'🎓 도서관에서 배울 수 있는 강좌가 있나요?', id:'q032'},
  {t:'👴 65세 어르신인데 집에서 책 받아볼 수 있나요?', id:'q061'},
];

window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q') || '';
  var autoSend = params.get('autoSend') !== 'false';

  if (q && autoSend) {
    addUser(q);
    doSearch(q);
  } else if (q && !autoSend) {
    // 팝업에서 넘어온 경우: ibox에만 채워두기
    ibox.value = q;
    aResize(ibox);
    addAI('<span style="color:var(--muted)">안녕하세요! 😊<br>아래 내용을 확인하시고 전송 버튼을 눌러주세요.</span>');
    ibox.focus();
  } else {
    addAI('<span style="color:var(--muted)">안녕하세요! 😊<br>도서관 이용 관련 무엇이든 편하게 물어보세요.</span>');
    showExamples();
    ibox.focus();
  }
});

function showExamples() {
  var r = document.createElement('div');
  r.className = 'brow';
  r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  bbl.innerHTML = '<div class="sug-label">이런 질문도 해보세요 👇</div><div class="sug-row" id="ex-row"></div>';
  r.appendChild(bbl);
  chat.appendChild(r);
  var row = document.getElementById('ex-row');
  EXAMPLES.forEach(function(e) {
    var btn = document.createElement('button');
    btn.className = 'sug-btn';
    btn.textContent = e.t;
    btn.onclick = function() { addUser(e.t); fetchDirect(e.id); };
    row.appendChild(btn);
  });
  scrollB();
}

function hKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function aResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function scrollB() { setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 50); }

function addUser(txt) {
  var r = document.createElement('div');
  r.className = 'brow usr';
  r.innerHTML = '<div class="bav u">나</div><div class="bbl usr">' + esc(txt) + '</div>';
  chat.appendChild(r);
  scrollB();
}

function addAI(html) {
  var r = document.createElement('div');
  r.className = 'brow';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  bbl.innerHTML = html;
  r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>';
  r.appendChild(bbl);
  chat.appendChild(r);
  scrollB();
  return bbl;
}

// 공감멘트 타이핑 → 카드 fadeIn → 추천칩 fadeIn
function addAIResult(empathy, cardsHtml, faqId) {
  var r = document.createElement('div');
  r.className = 'brow';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>';
  r.appendChild(bbl);
  chat.appendChild(r);
  scrollB();

  var i = 0;
  var cursor = document.createElement('span');
  cursor.className = 'cursor';
  bbl.appendChild(cursor);

  var t = setInterval(function() {
    if (i >= empathy.length) {
      clearInterval(t);
      cursor.remove();
      if (cardsHtml) {
        var cw = document.createElement('div');
        cw.className = 'fadein';
        cw.innerHTML = cardsHtml;
        bbl.appendChild(cw);
        scrollB();
        setTimeout(function() { cw.classList.add('show'); scrollB(); }, 50);
      }
      if (faqId && REL[faqId]) {
        var sw = document.createElement('div');
        sw.className = 'fadein';
        sw.innerHTML = makeSugHtml(faqId);
        bbl.appendChild(sw);
        setTimeout(function() { sw.classList.add('show'); scrollB(); }, 400);
      }
      return;
    }
    bbl.insertBefore(document.createTextNode(empathy[i++]), cursor);
    scrollB();
  }, 22);
}

function makeSugHtml(faqId) {
  var ids = REL[faqId] || [];
  if (!ids.length) return '';
  var chips = '';
  ids.forEach(function(id) {
    var label = FAQ_Q[id] || id;
    chips += '<button class="sug-btn" data-faqid="' + id + '">' + esc(label) + '</button>';
  });
  return '<div class="sug-wrap"><div class="sug-label">💡 이런 것도 궁금하지 않으세요?</div><div class="sug-row">' + chips + '</div></div>';
}

// 이벤트 위임
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.sug-btn[data-faqid]');
  if (!btn) return;
  var id = btn.getAttribute('data-faqid');
  var label = FAQ_Q[id] || id;
  addUser(label);
  fetchDirect(id);
});

function addLoad() {
  var r = document.createElement('div');
  r.className = 'lrow';
  r.innerHTML = '<div class="bav"><img src="' + M + '" alt=""></div>'
    + '<div class="lbub"><div class="lring"><div class="lring-c"></div><img src="' + M + '" alt=""></div>'
    + '<div id="lmsg" class="lmsg">' + MSGS[0] + ' <span class="ldots"><span></span><span></span><span></span></span></div></div>';
  chat.appendChild(r); scrollB();
  var mi = 0;
  var t = setInterval(function() {
    mi = (mi + 1) % MSGS.length;
    var el = document.getElementById('lmsg');
    if (el) el.innerHTML = MSGS[mi] + ' <span class="ldots"><span></span><span></span><span></span></span>';
  }, 900);
  r._stop = function() { clearInterval(t); };
  return r;
}

function send() {
  var q = ibox.value.trim();
  if (!q) return;
  ibox.value = '';
  ibox.style.height = 'auto';
  addUser(q);
  doSearch(q);
}

async function doSearch(q) {
  sbtn.disabled = true;
  var lr = addLoad();
  try {
    var res = await fetch(W, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q}) });
    var txt = await res.text();
    if (lr._stop) lr._stop(); lr.remove();
    if (!res.ok) { console.debug('[chat]', res.status, txt.slice(0,200)); addAI('일시적인 오류가 발생했어요 😥'); return; }
    var data = JSON.parse(txt);
    if (data.faq) CACHE[data.faq.id] = data.faq;
    renderResult(data, q);
  } catch(e) {
    console.debug('[chat]', e.message);
    if (lr._stop) lr._stop(); lr.remove();
    addAI('일시적인 오류가 발생했어요 😥');
  } finally { sbtn.disabled = false; ibox.focus(); }
}

async function fetchDirect(id) {
  if (CACHE[id]) { renderFaq(CACHE[id]); return; }
  sbtn.disabled = true;
  var lr = addLoad();
  try {
    var res = await fetch(W, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:'__direct__' + id}) });
    var data = await res.json();
    if (lr._stop) lr._stop(); lr.remove();
    if (data.faq) { CACHE[data.faq.id] = data.faq; renderFaq(data.faq); }
  } catch(e) {
    console.debug('[fetchDirect]', e.message);
    if (lr._stop) lr._stop(); lr.remove();
  } finally { sbtn.disabled = false; ibox.focus(); }
}

function renderFaq(faq) {
  var lb = faq.link ? '<a class="flink" href="' + esc(faq.link) + '" target="_blank">🔗 홈페이지에서 자세히 보기</a>' : '';
  var card = '<div class="fcard"><div class="fbar"></div><div class="fbody">'
    + '<div class="flbl">📚 관련 안내</div>'
    + '<div class="ftitle">' + esc(faq.title) + '</div>'
    + '<div class="fsum">' + esc(faq.summary) + '</div>'
    + lb + '</div></div>';
  addAIResult('안내드릴게요! 😊', card, faq.id);
}

function renderResult(data, q) {
  var staff = data.staff, faq = data.faq;
  var empathy = getEmpathy(q);
  if (!staff && !faq) {
    addAIResult(empathy,
      '<div class="fback"><div style="font-size:.82em;color:var(--muted)">안내실로 문의해 주세요</div>'
      + '<div class="fbacktel">02-721-0729</div><div class="fbacksub">평일 09:00 – 18:00</div></div>', null);
    return;
  }
  var cards = '';
  if (faq) {
    var lb = faq.link ? '<a class="flink" href="' + esc(faq.link) + '" target="_blank">🔗 홈페이지에서 자세히 보기</a>' : '';
    cards += '<div class="fcard"><div class="fbar"></div><div class="fbody">'
      + '<div class="flbl">📚 관련 안내</div>'
      + '<div class="ftitle">' + esc(faq.title) + '</div>'
      + '<div class="fsum">' + esc(faq.summary) + '</div>'
      + lb + '</div></div>';
  }
  if (staff) {
    cards += '<div class="scard"><div class="sbar"></div><div class="sbody">'
      + '<div class="sico">🧑</div><div class="sinfo">'
      + '<div class="sdept">' + esc(staff.dept) + '</div>'
      + '<div class="sname">' + esc(staff.name) + '</div>'
      + '<div class="srole">' + esc(staff.role) + '</div>'
      + '</div><div class="stel"><span style="font-size:.8em;margin-right:3px">☎</span>'
      + '<span class="stelnum">02-' + esc(staff.tel) + '</span></div></div></div>';
  }
  addAIResult(empathy, cards, faq ? faq.id : null);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
